<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: "Gill Sans";
            background: rgb(218, 245, 250);
            padding: 16px;
        }
        h1 {
            color: rgb(0, 65, 66);
            text-align: center;
        }
        .input-area {
            text-align: center;
            margin-bottom: 25px;
        }
        #tarefaInput {
            padding: 8px;
            border-radius: 25px;
            border: rgb(36, 121, 124) solid 3px;
        }
        #btnAdicionar {
            padding: 6px 12px;
            color: rgb(195, 240, 248);
            background-color: rgb(82, 136, 138);
            border: rgb(249, 255, 255) solid 2px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.5s;
        }
        #btnAdicionar:hover {
            background-color: rgb(47, 77, 78);
            color: rgb(203, 252, 253);
        }
        #listaTarefas {
            padding: 0px;
        }
        li {
            font-family: "Lucida Sans";
            background-color: rgb(247, 255, 255);
            padding: 10px;
            border-radius: 8px;
            border: rgb(64, 112, 114) solid 1px;
            display: flex;
            justify-content: space-between;
            margin-top: 0.5cm;
        }
        .fechar {
            background-color: rgb(141, 77, 77);
            border-radius: 100px;
            border: darkred solid 2px;
            color: white;
        }
        .fechar:hover {
            background-color: rgb(148, 45, 45);
            border-color: rgb(255, 0, 0) solid 2px;
            color: white;
        }
        .concluida {
            text-decoration: line-through;
            color: rgb(110, 110, 110);
        }
    </style>
<script src="script.js"></script>
</head>
<body>
    <h1>Tarefas</h1>
    <div class="input-area">
        <input id= "tarefaInput" type="text" placeholder="Digite sua tarefa!">
        <button id="btnAdicionar">+</button>
    </div>
    <ul id="listaTarefas">
    </ul>
</body>
</html>
